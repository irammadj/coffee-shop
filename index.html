<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coffee Shop</title>
    <style>
      body {
        margin: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
        background: #1a1a1a;
        color: white;
      }

      .navbar {
        padding: 20px 50px;
        display: flex;
        justify-content: flex-start;
        align-items: center;
        gap: 150px;
        border-bottom: 1px solid #333333;
      }

      .logo {
        color: #c9956f;
        font-size: 24px;
        font-weight: bold;
      }

      .nav-link {
        display: flex;
        gap: 50px;
        list-style: none;
      }

      .nav-link a {
        color: #ffffff;
        text-decoration: none;
        font-size: 16px;
        transition: 0.3s;
      }

      .nav-link a:hover {
        color: #c9956f;
      }

      .hero {
        padding: 100px 50px;
        display: flex;
        justify-content: space-between;
        align-items: stretch;
        gap: 50px;
        min-height: 600px;
      }

      .hero-content {
        max-width: 500px;
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .hero-title {
        font-size: 72px;
        font-weight: bold;
        margin-bottom: 20px;
      }

      .hero-text {
        font-size: 16px;
        color: #cccccc;
        line-height: 1.6;
        margin-bottom: 30px;
        font-family: arial, san-serif;
      }

      .button-group {
        display: flex;
        gap: 20px;
        margin-bottom: 30px;
      }

      .btn {
        padding: 12px 30px;
        font-size: 16px;
        border: none;
        cursor: pointer;
        border-radius: 5px;
        font-weight: bold;
        transition: 0.3s;
      }

      .btn1 {
        color: #ffffff;
        background-color: #c9956f;
      }

      .btn1:hover {
        background-color: #cf7d3e;
      }

      .btn2 {
        color: #c9956f;
        background-color: transparent;
        border: 2px solid #c9956f;
      }

      .btn2:hover {
        color: #ffffff;
        background-color: #c9956f;
      }

      .hero-image {
        display: flex;
        flex: 1;
        justify-content: center;
        align-items: center;
      }

      .hero-image img {
        width: 400px;
        height: auto;
        object-fit: contain;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="logo">Logo</div>
      <ul class="nav-link">
        <li><a href="#">Home</a></li>
        <li><a href="#">About us</a></li>
        <li><a href="#">Blogs</a></li>
        <li><a href="#">Contact us</a></li>
        <li><a href="#">Gallery</a></li>
      </ul>
    </nav>

    <section class="hero">
      <div class="hero-content">
        <h3 class="hero-title">Coffee shop</h3>
        <p class="hero-text">
          Get a variety of coffee flavors from our shop today and have a
          wonderful, lovely and lively day!
        </p>
        <div class="button-group">
          <button class="btn btn1">Get Started</button>
          <button class="btn btn2">About Shop</button>
        </div>
      </div>

      <div class="hero-image">
        <img
          src="https://static.vecteezy.com/system/resources/thumbnails/057/351/587/small/isolated-coffee-bean-with-a-fresh-cup-of-coffee-free-png.png"
          alt="coffee image with beans"
        />
      </div>

      </div>
    </section>
  </body>
</html>
